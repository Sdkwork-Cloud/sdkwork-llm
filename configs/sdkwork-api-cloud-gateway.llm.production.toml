mode = "embedded"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
bind = "127.0.0.1:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-llm-app-api"
workspace = "sdkwork-llm"
sdkFamily = "sdkwork-llm-app-sdk"
apiAuthority = "sdkwork-llm-app-api"
surface = "app"
apiPrefix = "/app/v3/api/llm"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_LLM_APPLICATION_PUBLIC_HTTP_URL"
coverage = "llm-app-api-upstream-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-llm-backend-api"
workspace = "sdkwork-llm"
sdkFamily = "sdkwork-llm-backend-sdk"
apiAuthority = "sdkwork-llm-backend-api"
surface = "backend"
apiPrefix = "/backend/v3/api/llm"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_LLM_APPLICATION_BACKEND_HTTP_URL"
coverage = "llm-backend-api-upstream-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-llm-open-api"
workspace = "sdkwork-llm"
sdkFamily = "sdkwork-llm-open-sdk"
apiAuthority = "sdkwork-llm-open-api"
surface = "open"
apiPrefix = "/llm/v3/api"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_LLM_APPLICATION_OPEN_HTTP_URL"
coverage = "llm-open-api-upstream-routes"

[[upstreams]]
serviceId = "sdkwork-llm-app-api"
baseUrl = "http://127.0.0.1:8080"

[[upstreams]]
serviceId = "sdkwork-llm-backend-api"
baseUrl = "http://127.0.0.1:8080"

[[upstreams]]
serviceId = "sdkwork-llm-open-api"
baseUrl = "http://127.0.0.1:8080"

[cors]
allowAnyOrigin = true
allowedOrigins = []

[request]
maxBodyBytes = 33554432
timeoutMs = 0

[readiness]
checkUpstreams = false
timeoutMs = 1000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = false
metricsPath = "/metrics"
tracingEnabled = false
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
allowedHosts = []
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = false

[security.waf]
enabled = false
mode = "monitor"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = false

[traffic]
rateLimitEnabled = false
compatXRateLimitHeaders = true
globalMaxInFlight = 1024
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = false
maxAttempts = 1
retryStatuses = [502, 503, 504]
retryBackoffMs = 0
circuitBreakerEnabled = false
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1
