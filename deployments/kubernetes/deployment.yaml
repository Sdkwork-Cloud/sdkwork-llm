apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdkwork-llm-standalone-gateway
  labels:
    app.kubernetes.io/name: sdkwork-llm
    app.kubernetes.io/component: standalone-gateway
    app.kubernetes.io/part-of: sdkwork-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-llm
      app.kubernetes.io/component: standalone-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-llm
        app.kubernetes.io/component: standalone-gateway
        app.kubernetes.io/part-of: sdkwork-llm
    spec:
      containers:
        - name: standalone-gateway
          image: sdkwork-llm-standalone-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SDKWORK_LLM_APP_ROOT
              value: /app
            - name: SDKWORK_LLM_ENVIRONMENT
              value: production
            - name: SDKWORK_LLM_CONFIG_PROFILE
              value: production
            - name: SDKWORK_LLM_DEPLOYMENT_PROFILE
              value: standalone
            - name: SDKWORK_LLM_SERVICE_LAYOUT
              value: unified-process
            - name: SDKWORK_LLM_RUNTIME_TARGET
              value: container
            - name: SDKWORK_LLM_APPLICATION_PUBLIC_INGRESS_BIND
              value: "0.0.0.0:8080"
            - name: SDKWORK_LLM_SNOWFLAKE_NODE_ID
              value: "1"
            - name: SDKWORK_LLM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-llm-database
                  key: database-url
            - name: SDKWORK_IAM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-llm-iam-database
                  key: database-url
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
